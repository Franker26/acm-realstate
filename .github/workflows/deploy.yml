name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/acm-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/acm-frontend:latest

      - name: Deploy to prometeo via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROMETEO_HOST }}
          username: ${{ secrets.PROMETEO_USER }}
          key: ${{ secrets.PROMETEO_SSH_KEY }}
          script: |
            cd /home/fzanetti/dev-tools/acm-realstate
            git pull origin main
            kubectl apply -f k8s/
            kubectl rollout status deployment/backend -n acm --timeout=120s
            kubectl rollout status deployment/frontend -n acm --timeout=120s
