apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: acm
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: acm
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
